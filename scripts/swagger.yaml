openapi: 3.0.0
info:
  title: Lachlan Website API
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /api/books:
    get:
      summary: List books
      responses:
        '200':
          description: List of books
    post:
      summary: Add a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                title:
                  type: string
                year:
                  type: integer
                note:
                  type: string
      responses:
        '200':
          description: Book added
    put:
      summary: Update a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldFirstName:
                  type: string
                oldLastName:
                  type: string
                oldTitle:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                title:
                  type: string
                year:
                  type: integer
                note:
                  type: string
      responses:
        '200':
          description: Book updated
    delete:
      summary: Delete a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                title:
                  type: string
      responses:
        '200':
          description: Book deleted
  /api/concerts:
    get:
      summary: List concerts
      responses:
        '200':
          description: List of concerts
    post:
      summary: Add a concert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                band:
                  type: string
                date:
                  type: string
                venue:
                  type: string
                support:
                  type: array
                  items:
                    type: string
                setlist:
                  type: object
                  properties:
                    source:
                      type: string
                    url:
                      type: string
                    songs:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: Concert added
    put:
      summary: Update a concert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldBand:
                  type: string
                oldDate:
                  type: string
                band:
                  type: string
                date:
                  type: string
                venue:
                  type: string
                support:
                  type: array
                  items:
                    type: string
                setlist:
                  type: object
                  properties:
                    source:
                      type: string
                    url:
                      type: string
                    songs:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: Concert updated
    delete:
      summary: Delete a concert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                band:
                  type: string
                date:
                  type: string
      responses:
        '200':
          description: Concert deleted
  /api/tv:
    get:
      summary: List TV shows
      responses:
        '200':
          description: List of TV shows
    post:
      summary: Add a TV show
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                show:
                  type: string
                year:
                  type: integer
                type:
                  type: string
                  enum: [watched]
                seasons:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: TV show added
    put:
      summary: Update a TV show
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                year:
                  type: integer
                oldShow:
                  type: string
                show:
                  type: string
                type:
                  type: string
                  enum: [watched]
                seasons:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: TV show updated
    delete:
      summary: Delete a TV show
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                year:
                  type: integer
                show:
                  type: string
                type:
                  type: string
                  enum: [watched]
      responses:
        '200':
          description: TV show deleted
  /api/travel:
    get:
      summary: List travel entries
      responses:
        '200':
          description: List of travel entries
    post:
      summary: Add a travel entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                title:
                  type: string
                link:
                  type: string
                extra:
                  type: string
      responses:
        '200':
          description: Travel entry added
    put:
      summary: Update a travel entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                oldTitle:
                  type: string
                title:
                  type: string
                link:
                  type: string
                extra:
                  type: string
      responses:
        '200':
          description: Travel entry updated
    delete:
      summary: Delete a travel entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                title:
                  type: string
      responses:
        '200':
          description: Travel entry deleted
  /api/travel/trip:
    post:
      summary: Add a trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                start:
                  type: string
                end:
                  type: string
      responses:
        '200':
          description: Trip added
    put:
      summary: Update a trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldTitle:
                  type: string
                title:
                  type: string
                start:
                  type: string
                end:
                  type: string
      responses:
        '200':
          description: Trip updated
    delete:
      summary: Delete a trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        '200':
          description: Trip deleted
  /api/travel/entry:
    post:
      summary: Add a journal entry to a trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tripTitle:
                  type: string
                date:
                  type: string
                location:
                  type: string
                text:
                  type: string
      responses:
        '200':
          description: Entry added
    put:
      summary: Update a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tripTitle:
                  type: string
                oldDate:
                  type: string
                oldLocation:
                  type: string
                date:
                  type: string
                location:
                  type: string
                text:
                  type: string
      responses:
        '200':
          description: Entry updated
    delete:
      summary: Delete a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tripTitle:
                  type: string
                date:
                  type: string
                location:
                  type: string
      responses:
        '200':
          description: Entry deleted
  /api/status:
    get:
      summary: Get API status
      responses:
        '200':
          description: API status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  port: { type: integer }
                  baseDir: { type: string }
  /api/commit:
    post:
      summary: Manually commit changes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
      responses:
        '200':
          description: Changes committed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
